<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>任务详情</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/task-detail.css?v=2" />
    <link rel="stylesheet" href="/css/ui-bootstrap.css?v=1" />
  </head>
  <body>
    <div class="task-detail-page container-xl py-3">
      <nav class="top-nav" aria-label="页面切换">
        <a href="/" class="nav-link">关键字搜索</a>
        <span class="nav-sep" aria-hidden="true">·</span>
        <a href="/manga.html" class="nav-link">漫画式图片浏览</a>
        <span class="nav-sep" aria-hidden="true">·</span>
        <a href="/video.html" class="nav-link">视频浏览</a>
        <span class="nav-sep" aria-hidden="true">·</span>
        <a href="/overview.html" class="nav-link">标注一览</a>
        <span class="nav-sep" aria-hidden="true">·</span>
        <a href="/task.html" class="nav-link nav-link-current">任务</a>
      </nav>

      <p class="back-row"><a href="/task.html" id="backToTask">← 返回任务列表</a></p>
      <h1 id="detailPageTitle">任务详情</h1>
      <section id="detailTaskCard" class="task-card"></section>

      <form id="progressForm" class="progress-form">
        <label>
          <span id="progressLabel">当前进展（Markdown）</span>
          <textarea id="progressInput" rows="6" maxlength="12000"></textarea>
        </label>
        <div class="progress-form-actions">
          <button type="submit" id="progressSubmitBtn">追加进展</button>
          <button type="button" id="progressCancelEditBtn" class="progress-cancel-btn" hidden>取消编辑</button>
        </div>
      </form>
      <details class="md-guide">
        <summary id="progressMdGuideTitle">Markdown 语法说明</summary>
        <pre id="progressMdGuideBody" class="md-guide-body"></pre>
      </details>
      <p id="detailStatus" class="status-line" aria-live="polite"></p>

      <section>
        <h2 id="progressListTitle">进展记录</h2>
        <div id="progressList" class="progress-list"></div>
      </section>
    </div>
    <script src="/js/i18n.js?v=1"></script>
    <script src="/js/task-detail.js?v=2"></script>
  </body>
</html>
